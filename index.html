<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumi Winx Pet Bubble</title>
    <link rel="stylesheet" href="./pet-bubble.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="stage" aria-label="Pet chat bubble demo">
        <div class="pet-widget" id="petWidget">
          <div class="pet-bubble" id="petBubble" role="status" aria-live="polite">
            <span id="petBubbleText"></span>
          </div>
          <div class="pet-avatar" aria-label="Lumi Winx"></div>
        </div>
      </section>

      <section class="control-panel" aria-label="Paaraket AI controls">
        <label for="questionText">Ask Paaraket AI</label>
        <textarea id="questionText" rows="3">What is the difference between let and const in JavaScript?</textarea>

        <div class="actions">
          <button id="askPaaraket" type="button">Hỏi Paaraket</button>
          <button id="voiceDemo" type="button">Voice thử</button>
        </div>

        <label for="assistantText" class="answer-label">Answer draft</label>
        <textarea id="assistantText" rows="5" readonly>Mình làm được nè, để mình kiểm tra cho bạn.</textarea>

        <p class="hint">
          Bản local mock tìm câu hỏi gần giống trong dữ liệu training, trả lời nhanh và đưa bản cute cho Lumi Winx.
        </p>
      </section>
    </main>

    <script src="./pet-bubble.js"></script>
  </body>
</html>
