<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumi Winx Pet Bubble</title>
    <link rel="stylesheet" href="./pet-bubble.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="stage" aria-label="Pet chat bubble demo">
        <div class="pet-widget" id="petWidget">
          <div class="pet-bubble" id="petBubble" role="status" aria-live="polite">
            <span id="petBubbleText"></span>
          </div>
          <div class="pet-avatar" aria-label="Lumi Winx"></div>
        </div>
      </section>

      <section class="control-panel" aria-label="Paaraket AI controls">
        <label for="questionText">Ask Paaraket AI</label>
        <textarea id="questionText" rows="3">start</textarea>

        <label for="ollamaBaseUrl" class="answer-label">Ollama server URL</label>
        <input
          id="ollamaBaseUrl"
          type="url"
          value="https://ignition-good-urethane.ngrok-free.dev"
          placeholder="http://localhost:11434 or https://your-ngrok-url"
        />

        <label for="voiceLanguage" class="answer-label">Voice language</label>
        <select id="voiceLanguage">
          <option value="en-US" selected>English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="vi-VN">Vietnamese</option>
        </select>

        <div class="mode-row" aria-label="Answer mode">
          <label class="mode-option">
            <input type="radio" name="answerMode" value="coach" checked />
            Speaking coach
          </label>
          <label class="mode-option">
            <input type="radio" name="answerMode" value="speaking" />
            Speaking practice
          </label>
          <label class="mode-option">
            <input type="radio" name="answerMode" value="ollama" />
            Ollama local
          </label>
        </div>

        <div class="actions">
          <button id="askPaaraket" type="button">Hỏi Paaraket</button>
          <button id="voiceDemo" type="button">Voice thử</button>
        </div>

        <label for="assistantText" class="answer-label">Answer draft</label>
        <textarea id="assistantText" rows="5" readonly>Mình làm được nè, để mình kiểm tra cho bạn.</textarea>

        <p class="hint">
          Speaking practice dùng profile/topic của cậu rồi nhờ Ollama soạn câu trả lời tiếng Anh ngắn, tự nhiên.
        </p>
      </section>
    </main>

    <script src="./pet-bubble.js"></script>
  </body>
</html>
